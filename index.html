<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國地鐵即時查詢系統 v2.0</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --tab-inactive-bg: #f1f5f9;
            --ko-bg: #eff6ff;
            --ko-text: #1e40af;
        }

        /* 🌙 完美支援手機/電腦深色模式 (Dark Mode) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --container-bg: #1e293b;
                --text-main: #f8fafc;
                --text-sub: #94a3b8;
                --border-color: #334155;
                --border-hover: #475569;
                --tab-inactive-bg: #334155;
                --ko-bg: #1e3a8a;
                --ko-text: #60a5fa;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 720px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-align: center;
            color: var(--text-main);
        }
        .subtitle {
            text-align: center;
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .city-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: var(--tab-inactive-bg);
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        /* 🗺️ 地鐵圖智慧摺疊區 */
        .map-view-section {
            margin-bottom: 15px;
        }
        .map-toggle-btn {
            width: 100%;
            padding: 11px;
            background: var(--tab-inactive-bg);
            border: 1px dashed var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .map-toggle-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .map-viewport {
            display: none;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            background: #ffffff;
        }
        .map-control-bar {
            background: var(--tab-inactive-bg);
            padding: 8px 14px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .map-title {
            font-weight: bold;
            color: var(--text-main);
        }
        .map-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
        }
        .map-link:hover {
            text-decoration: underline;
        }
        .map-img-wrapper {
            background: #ffffff;
        }

        /* ⏱️ 歷史紀錄快選區 */
        .history-section {
            margin-bottom: 15px;
            font-size: 13px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .history-title {
            color: var(--text-sub);
        }
        .history-tag {
            background: var(--tab-inactive-bg);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .history-tag:hover {
            border-color: #3b82f6;
        }

        .search-box {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            background: var(--container-bg);
            color: var(--text-main);
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: #3b82f6;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-sub);
            margin: 12px 0;
            padding: 0 4px;
        }
        .station-list {
            max-height: 550px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .station-card {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .station-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border-color: var(--border-hover);
        }
        .station-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 65%;
        }
        .zh-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }
        .en-name {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }
        .meta-info {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .line-pill {
            font-size: 11px;
            padding: 2px 8px;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        
        .transfer-section {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-sub);
            flex-wrap: wrap;
        }
        .transfer-title {
            color: var(--text-sub);
            font-weight: 500;
        }
        .transfer-badge {
            font-size: 10px;
            padding: 1px 6px;
            color: white;
            border-radius: 4px;
            font-weight: bold;
        }

        .ko-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            width: 35%;
        }
        .ko-name {
            font-size: 19px;
            font-weight: bold;
            color: var(--ko-text);
            background: var(--ko-bg);
            padding: 6px 14px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            text-align: right;
            box-sizing: border-box;
            max-width: 100%;
        }
        .copy-hint {
            font-size: 10px;
            color: var(--text-sub);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0f172a;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .no-result {
            text-align: center;
            color: var(--text-sub);
            padding: 40px;
            font-size: 15px;
        }
    </style>
</head>

        {"lineName":"金海輕軌","id":"11","zh":"池內","en":"Jinae","ko":"지내","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"12","zh":"金海大學","en":"Gimhae College","ko":"김해대학","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"13","zh":"仁濟大","en":"Inje Univ.","ko":"인제대","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"14","zh":"金海市廳","en":"Gimhae City Hall","ko":"김해시청","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"15","zh":"府院","en":"Buwon","ko":"부원","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"16","zh":"鳳凰","en":"Bonghwang","ko":"봉황","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"17","zh":"首露王陵","en":"Royal Tomb of King Suro","ko":"수로왕릉","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"18","zh":"博物館","en":"Gimhae National Museum","ko":"박물관","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"19","zh":"蓮池公園","en":"Yeonji Park","ko":"연지공원","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"20","zh":"長神大","en":"Presbyterian Univ.","ko":"장신대","transfers":"無","lineColor":"#800080"},
        {"lineName":"金海輕軌","id":"21","zh":"加耶大","en":"Gaya Univ.","ko":"가야대","transfers":"無","lineColor":"#800080"}
    ];

  // 🧠 智慧大站合併 + 自動前後站偵測引擎
function processSubwayData(rawArray) {
    const mergedMap = new Map();
    
    // 💡 先將所有車站依路線名稱分組，方便精準定位前後站
    const linesGroup = {};
    rawArray.forEach(item => {
        if (!linesGroup[item.lineName]) linesGroup[item.lineName] = [];
        linesGroup[item.lineName].push(item);
    });

    rawArray.forEach(item => {
        const key = item.zh.trim();
        if (!mergedMap.has(key)) {
            mergedMap.set(key, {
                zh: key,
                en: item.en,
                ko: item.ko,
                lines: [],
                allTransfers: new Set()
            });
        }
        
        const stationGroup = mergedMap.get(key);
        
        // 🔍 精確抓取當前車站在該路線中的上下游鄰居
        const currentLineList = linesGroup[item.lineName];
        const idx = currentLineList.findIndex(s => s.id === item.id);
        const prevStation = idx > 0 ? currentLineList[idx - 1].zh : "起點站";
        const nextStation = idx < currentLineList.length - 1 ? currentLineList[idx + 1].zh : "終點站";

        // 將鄰居資訊一起封裝進線路標籤中
        stationGroup.lines.push({
            name: item.lineName,
            color: item.lineColor,
            id: item.id,
            prev: prevStation,
            next: nextStation
        });
        
        if (item.transfers && item.transfers !== "無") {
            const parts = item.transfers.split(/[、，]/);
            parts.forEach(p => stationGroup.allTransfers.add(p.trim()));
        }
    });
    
    return Array.from(mergedMap.values());
}

    // 數據預編譯
    const seoulData = processSubwayData(rawSeoulData);
    const busanData = processSubwayData(rawBusanData);

    let currentCity = 'seoul';
    let subwayData = [...seoulData];

    // 雙城分頁切換
    function switchCity(city) {
        currentCity = city;
        document.getElementById('btn-seoul').classList.remove('active');
        document.getElementById('btn-busan').classList.remove('active');
        document.getElementById('searchInput').value = '';

        if (city === 'seoul') {
            subwayData = [...seoulData];
            document.getElementById('cityStatus').innerText = '目前城市：首爾地鐵';
            document.getElementById('btn-seoul').classList.add('active');
        } else if (city === 'busan') {
            subwayData = [...busanData];
            document.getElementById('cityStatus').innerText = '目前城市：釜山地鐵';
            document.getElementById('btn-busan').classList.add('active');
        }

        renderStations(subwayData);
        renderHistory();
        updateMapContent(); // 👈 城市切換時，自動重新載入地圖內容
    }

    // 🗺️ 地鐵路網圖動態顯示/摺疊控制
    function toggleMap() {
        const viewport = document.getElementById('mapViewport');
        const btn = document.getElementById('mapToggleBtn');
        
        if (viewport.style.display === 'none' || viewport.style.display === '') {
            viewport.style.display = 'block';
            btn.innerText = '🔼 隱藏地鐵路網圖';
            updateMapContent(); 
        } else {
            viewport.style.display = 'none';
            btn.innerText = '🗺️ 顯示目前城市地鐵圖';
        }
    }

    // 🗺️ 跨 PDF / 圖片雙引擎地圖動態渲染器
    function updateMapContent() {
        const mapData = cityMaps[currentCity];
        document.getElementById('mapTitle').innerText = mapData.title;
        document.getElementById('mapFullLink').href = mapData.url;
        
        const wrapper = document.getElementById('mapImgWrapper');
        
        if (mapData.type === "pdf") {
            // 首爾：使用網頁內嵌 iframe 無縫解析 PDF 檔
            wrapper.innerHTML = `
                <iframe src="${mapData.url}" width="100%" height="480px" style="border:none; display:block;">
                    您的瀏覽器不支援直接預覽 PDF，請點選右上角連結查看。
                </iframe>`;
        } else {
            // 釜山：使用支援手機滑動的 RWD 圖片視窗
            wrapper.innerHTML = `
                <div style="padding:10px; max-height:380px; overflow:auto; background:#ffffff;">
                    <img src="${mapData.url}" alt="地鐵圖" style="width:100%; height:auto; display:block; margin:0 auto;">
                </div>`;
        }
    }

    // 🔄 換乘動態彩色 Badge 生成器
    function generateTransferBadges(transferSet) {
        if (!transferSet || transferSet.size === 0) return "";
        
        let html = '<div class="transfer-section"><span class="transfer-title">🔄 轉乘：</span>';
        transferSet.forEach(line => {
            let matchedColor = "#475569"; 
            for (let colorName in colorPalette) {
                if (line.includes(colorName)) {
                    matchedColor = colorPalette[colorName];
                    break;
                }
            }
            html += `<span class="transfer-badge" style="background-color: ${matchedColor};">${line}</span>`;
        });
        html += '</div>';
        return html;
    }

    // 📋 卡片點擊事件（快選紀錄 + 韓文站名秒複製）
    function handleCardClick(zhName, koName) {
        navigator.clipboard.writeText(koName).then(() => {
            const toast = document.getElementById('toast');
            toast.innerText = `📋 已複製「${koName}」，可直接貼進地圖！`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        });

        let history = JSON.parse(localStorage.getItem(`history_${currentCity}`)) || [];
        history = history.filter(item => item.zh !== zhName);
        history.unshift({ zh: zhName, ko: koName });
        if (history.length > 4) history.pop();
        localStorage.setItem(`history_${currentCity}`, JSON.stringify(history));
        
        renderHistory();
    }

    // ⏰ 最近查過快速鍵快打區
    function renderHistory() {
        const historySection = document.getElementById('historySection');
        const history = JSON.parse(localStorage.getItem(`history_${currentCity}`)) || [];
        
        if (history.length === 0) {
            historySection.innerHTML = '<span class="history-title">最近查過：</span><span style="color:var(--text-sub); font-style:italic;">暫無歷史紀錄</span>';
            return;
        }

        let html = '<span class="history-title">最近查過：</span>';
        history.forEach(item => {
            html += `<span class="history-tag" onclick="quickSearch('${item.zh}')">${item.zh}</span>`;
        });
        historySection.innerHTML = html;
    }

    function quickSearch(name) {
        document.getElementById('searchInput').value = name;
        filterStations();
    }

// 🖥️ 車站列表主卡片渲染機制 (含前後站智慧導航版)
function renderStations(data) {
    const listContainer = document.getElementById('stationList');
    const countContainer = document.getElementById('resultCount');
    listContainer.innerHTML = '';
    
    countContainer.innerText = `共 ${data.length} 個綜合大站`;

    if (data.length === 0) {
        listContainer.innerHTML = '<div class="no-result">沒有找到符合條件的站點 🔍</div>';
        return;
    }

    data.forEach(station => {
        const card = document.createElement('div');
        card.className = 'station-card';
        card.onclick = () => handleCardClick(station.zh, station.ko);
        
        // 💡 核心改動：動態將前後站輸出至線路標籤右側
        let linesHtml = "";
        station.lines.forEach(line => {
            linesHtml += `
                <div style="display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap;">
                    <span class="line-pill" style="background-color: ${line.color}; margin: 0;">
                        <span style="font-size:9px; background:rgba(0,0,0,0.2); padding:1px 4px; border-radius:3px;">${line.id}</span>
                        ${line.name}
                    </span>
                    <span style="font-size: 11px; color: var(--text-sub); display: inline-flex; align-items: center; gap: 2px; opacity: 0.85;">
                        (${line.prev} ➡️ <b>${station.zh}</b> ➡️ ${line.next})
                    </span>
                </div>
            `;
        });
        
        const cleanTransfers = new Set();
        station.allTransfers.forEach(t => {
            const isMainLine = station.lines.some(l => t.includes(l.name));
            if (!isMainLine) cleanTransfers.add(t);
        });

        const transferHtml = generateTransferBadges(cleanTransfers);

        card.innerHTML = `
            <div class="station-info" style="width: 70%;">
                <div class="meta-info" style="display:block;">
                    <span class="zh-name" style="display:block; margin-bottom: 2px;">${station.zh}</span>
                    ${linesHtml}
                </div>
                <div class="en-name" style="margin-top: 6px;">${station.en}</div>
                ${transferHtml}
            </div>
            <div class="ko-box" style="width: 30%;">
                <div class="ko-name">${station.ko}</div>
                <span class="copy-hint">點擊複製 📋</span>
            </div>
        `;
        listContainer.appendChild(card);
    });
}

    // 🔍 四合一智慧快搜
    function filterStations() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = subwayData.filter(station => {
            const matchId = station.lines.some(l => l.id.toLowerCase().includes(query));
            return station.zh.toLowerCase().includes(query) || 
                   station.en.toLowerCase().includes(query) ||
                   station.ko.toLowerCase().includes(query) ||
                   matchId;
        });
        renderStations(filtered);
    }

    // 🚀 初始化載入
    renderStations(subwayData);
    renderHistory();
    updateMapContent();
</script>
