            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.15s, box-shadow 0.15s;

    // 渲染資料到畫面上
    function renderStations(data) {
        const listContainer = document.getElementById('stationList');
        const countContainer = document.getElementById('resultCount');
        listContainer.innerHTML = '';
        
        countContainer.innerText = `找到 ${data.length} 個站點`;

        if (data.length === 0) {
            listContainer.innerHTML = '<div class="no-result">沒有找到符合條件的站點 🔍</div>';
            return;
        }

        data.forEach(station => {
            const card = document.createElement('div');
            card.className = 'station-card';
            
            // 根據線路動態加入對應的顏色類別，如果沒有對應就使用預設樣式
            const lineClass = `line-${station.line.replace('（環）','')}`;
            const lineBadgeHtml = station.line ? `<span class="line-badge ${lineClass}">${station.line}</span>` : '';

            card.innerHTML = `
                <div class="station-info">
                    <div class="meta-info">
                        <span class="zh-name">${station.zh}</span>
                        ${lineBadgeHtml}
                    </div>
                    <div class="en-name">${station.en}</div>
                </div>
                <div class="ko-name">${station.ko}</div>
            `;
            listContainer.appendChild(card);
        });
    }

    // 搜尋過濾功能 (支援中文、英文大小寫模糊搜尋)
    function filterStations() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = subwayData.filter(station => {
            return station.zh.toLowerCase().includes(query) || 
                   station.en.toLowerCase().includes(query);
        });
        renderStations(filtered);
    }

    // 網頁初始化載入
    renderStations(subwayData);
</script>
